<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini API Key Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }

        .card {
            background: #333;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        h2 {
            margin-top: 0;
            color: #a855f7;
        }

        pre {
            background: #000;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 14px;
        }

        .success {
            color: #4ade80;
        }

        .error {
            color: #f87171;
        }

        button {
            padding: 10px 20px;
            background: #a855f7;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #9333ea;
        }
    </style>
</head>

<body>
    <h1>🔑 Gemini API Key Diagnostic</h1>

    <div class="card">
        <h2>1. API Key Information</h2>
        <p><strong>Configured Key:</strong> <span id="key-display">AIzaSyA_i3AFH4YWEJdwHSU5Wl5X0tJWXGEbV-E</span></p>
        <button onclick="runTest()">Run Diagnostic Test</button>
    </div>

    <div class="card">
        <h2>2. List Models Test</h2>
        <div id="list-status">Waiting...</div>
        <pre id="list-result">Click "Run Diagnostic Test" to start.</pre>
    </div>

    <div class="card">
        <h2>3. Generation Test (gemini-1.5-flash)</h2>
        <div id="gen-status">Waiting...</div>
        <pre id="gen-result">Click "Run Diagnostic Test" to start.</pre>
    </div>

    <script>
        const API_KEY = 'AIzaSyA_i3AFH4YWEJdwHSU5Wl5X0tJWXGEbV-E';

        async function runTest() {
            // Test 1: List Models
            const listStatus = document.getElementById('list-status');
            const listResult = document.getElementById('list-result');

            listStatus.textContent = "Testing...";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${API_KEY}`);
                const data = await response.json();

                if (response.ok) {
                    listStatus.innerHTML = '<span class="success">✅ SUCCESS</span>';
                    // Filter relevant models
                    const models = data.models ? data.models
                        .filter(m => m.supportedGenerationMethods.includes('generateContent'))
                        .map(m => m.name) : [];
                    listResult.textContent = "Available Models:\n" + JSON.stringify(models, null, 2);
                } else {
                    listStatus.innerHTML = '<span class="error">❌ FAILED</span>';
                    listResult.textContent = `Error ${response.status}: ${data.error?.message || response.statusText}`;
                }
            } catch (e) {
                listStatus.innerHTML = '<span class="error">❌ NETWORK ERROR</span>';
                listResult.textContent = e.message;
            }

            // Test 2: Generate Content
            const genStatus = document.getElementById('gen-status');
            const genResult = document.getElementById('gen-result');

            genStatus.textContent = "Testing...";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Hello" }] }] })
                });
                const data = await response.json();

                if (response.ok) {
                    genStatus.innerHTML = '<span class="success">✅ SUCCESS</span>';
                    genResult.textContent = JSON.stringify(data, null, 2);
                } else {
                    genStatus.innerHTML = '<span class="error">❌ FAILED</span>';
                    genResult.textContent = `Error ${response.status}: ${data.error?.message || response.statusText}`;
                }
            } catch (e) {
                genStatus.innerHTML = '<span class="error">❌ NETWORK ERROR</span>';
                genResult.textContent = e.message;
            }
        }
    </script>
</body>

</html>
